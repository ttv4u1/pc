<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v28</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00d2ff;
            --card-yellow: #fdf2a4; 
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png');
            background-size: cover;
            background-attachment: fixed;
            color: white;
        }

        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn-google { background: white; color: #444; padding: 12px 24px; border-radius: 5px; border: none; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #main-app { display: none; }

        header { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 15px 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; margin-top: 10px;}
        .user-profile img { width: 30px; border-radius: 50%; }
        .logos { display: flex; align-items: center; gap: 15px; }
        .logos img { height: 40px; filter: drop-shadow(0 0 5px var(--neon-blue)); }
        .live-clock { text-align: right; font-family: 'Orbitron', sans-serif; color: var(--neon-blue); }

        .control-panel { background: rgba(255, 255, 255, 0.07); padding: 20px; border-radius: 15px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7rem; color: var(--neon-blue); font-weight: bold; text-transform: uppercase; }
        input, select { padding: 8px; border-radius: 5px; border: none; font-size: 0.9rem; font-weight: bold; }

        .btn-group { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; transition: 0.3s; text-transform: uppercase; }
        .btn-save { background: var(--neon-blue); color: #000; }
        .btn-print { background: #ffffff; color: #000; }
        .btn-logout { background: #ff4d4d; color: white; padding: 5px 10px; font-size: 10px; border-radius: 4px;}

        .a4-page { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 0 auto; min-height: 20cm; }
        .punch-card { background: var(--card-yellow) !important; color: black; width: 8.5cm; height: 19.3cm; padding: 10px 8px; border: 1.5px solid #000; display: flex; flex-direction: column; position: relative; }
        .card-title { text-align: center; font-weight: 900; font-size: 13px; border-bottom: 2px solid black; padding-bottom: 2px; margin-bottom: 5px; }
        .meta-info { display: grid; grid-template-columns: 70px 1fr; font-size: 9px; font-weight: 900; line-height: 1.2; border-bottom: 1.2px solid black; padding-bottom: 3px; }
        .meta-full { grid-column: span 2; border-top: 0.5px solid black; padding: 1px 0; }
        .month-year { text-align: center; font-weight: 900; font-size: 13px; margin: 5px 0; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; border: 1.2px solid black; }
        th, td { border: 1px solid black; text-align: center; font-size: 10px; font-weight: 900; padding: 0; }
        tbody td { height: 25.5px; }
        .weekend-row { background: rgba(0,0,0,0.07); color: #800; }

        @media print {
            header, .control-panel, #login-screen { display: none !important; }
            body { background: white !important; padding: 0; }
            .a4-page { height: 100vh; width: 100vw; gap: 15mm; }
            .punch-card { box-shadow: none !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" height="100" alt="Jata Negara">
        <h1 style="font-family: 'Orbitron';">SISTEM REPLIKA KAD PERAKAM WAKTU</h1>
        <button class="btn-google" onclick="login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Log Masuk dengan Google
        </button>
    </div>

    <div id="main-app">
        <header>
            <div class="logos">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" alt="Jata Negara">
                <div>
                    <div id="user-info" class="user-profile"></div>
                    <button class="btn-logout" onclick="logout()">LOGOUT</button>
                </div>
            </div>
            <div class="live-clock">
                <div id="d-txt" style="font-size: 0.8rem;">--</div>
                <div id="t-txt" style="font-size: 2rem; font-weight: 900;">00:00:00 AM</div>
            </div>
        </header>

        <div class="control-panel">
            <div class="input-group"><label>Bulan/Tahun</label><input type="month" id="mPicker" onchange="init()"></div>
            <div class="input-group"><label>Tarikh (TAR)</label><select id="dPicker"></select></div>
            <div class="input-group"><label>Masuk 1</label><input type="time" id="v1"></div>
            <div class="input-group"><label>Keluar 1</label><input type="time" id="v2"></div>
            <div class="input-group"><label>Masuk 2</label><input type="time" id="v3"></div>
            <div class="input-group"><label>Keluar 2</label><input type="time" id="v4"></div>
            <div class="input-group"><label>Kenyataan</label><input type="text" id="vNote" placeholder="Cth: Cuti"></div>
            
            <div class="btn-group">
                <button class="btn-save" id="saveBtn" onclick="saveData()">SIMPAN DATA</button>
                <button class="btn-print" onclick="window.print()">PRINT REPLIKA</button>
            </div>

            <div class="input-group" style="grid-column: span 2;"><label>B No.</label><input type="text" id="bnoI" value="16" oninput="sync()"></div>
            <div class="input-group" style="grid-column: span 2;"><label>Nama Pegawai</label><input type="text" id="nameI" value="MOHD FIRDAUS" oninput="sync()"></div>
        </div>

        <div class="a4-page">
            <div class="punch-card">
                <div class="card-title">KAD MENCATAT WAKTU</div>
                <div class="meta-info">
                    <div>B No. <span class="d-bno">16</span></div>
                    <div>NAMA: <span class="d-name">MOHD FIRDAUS</span></div>
                    <div class="meta-full">KEM./JAB.: <span class="d-jab">PERKHIDMATAN VETERINAR</span></div>
                </div>
                <div class="month-year" id="mt1">--</div>
                <table>
                    <thead><tr><th rowspan="2">TAR</th><th>M</th><th>K</th><th>M</th><th>K</th><th rowspan="2">KENYATAAN</th></tr><tr style="height:10px"><td colspan="4"></td></tr></thead>
                    <tbody id="b1"></tbody>
                </table>
            </div>

            <div class="punch-card">
                <div class="card-title">KAD MENCATAT WAKTU</div>
                <div class="meta-info">
                    <div>B No. <span class="d-bno">16</span></div>
                    <div>NAMA: <span class="d-name">MOHD FIRDAUS</span></div>
                    <div class="meta-full">KEM./JAB.: <span class="d-jab">PERKHIDMATAN VETERINAR</span></div>
                </div>
                <div class="month-year" id="mt2">--</div>
                <table>
                    <thead><tr><th rowspan="2">TAR</th><th>M</th><th>K</th><th>M</th><th>K</th><th rowspan="2">KENYATAAN</th></tr><tr style="height:10px"><td colspan="4"></td></tr></thead>
                    <tbody id="b2"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURASI FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyBEijt2e7QouToEdmr8A0il3sAQcBdS2lw",
            authDomain: "punchcardv26.firebaseapp.com",
            projectId: "punchcardv26",
            storageBucket: "punchcardv26.firebasestorage.app",
            messagingSenderId: "275133505519",
            appId: "1:275133505519:web:9a9a6e30cd8ea738b3a01a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        // === AUTH LOGIC ===
        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-info').innerHTML = `<img src="${user.photoURL}"> <span>${user.displayName}</span>`;
                init();
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // === APP LOGIC ===
        function clock() {
            const n = new Date();
            document.getElementById('d-txt').innerText = n.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            let h = n.getHours(), m = String(n.getMinutes()).padStart(2, '0'), s = String(n.getSeconds()).padStart(2, '0');
            let am = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            document.getElementById('t-txt').innerText = `${h}:${m}:${s} ${am}`;
        }
        setInterval(clock, 1000); clock();

        const mInp = document.getElementById('mPicker');
        if(!mInp.value) mInp.value = new Date().toISOString().substr(0, 7);

        function init() {
            const [y, m] = mInp.value.split('-').map(Number);
            const months = ["JANUARI", "FEBRUARI", "MAC", "APRIL", "MEI", "JUN", "JULAI", "OGOS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DISEMBER"];
            document.getElementById('mt1').innerText = document.getElementById('mt2').innerText = `${months[m-1]} ${y}`;

            const daysInMonth = new Date(y, m, 0).getDate();
            const tb1 = document.getElementById('b1'), tb2 = document.getElementById('b2'), dInp = document.getElementById('dPicker');
            tb1.innerHTML = ""; tb2.innerHTML = ""; dInp.innerHTML = "";

            for (let i = 1; i <= 31; i++) {
                let cls = "", ken = "", isExtra = i > daysInMonth;
                if (!isExtra) {
                    let o = document.createElement('option'); o.value = i; o.innerText = i; dInp.appendChild(o);
                    const d = new Date(y, m - 1, i);
                    if (d.getDay() === 0) { cls = "weekend-row"; ken = "Ahad"; }
                    else if (d.getDay() === 6) { cls = "weekend-row"; ken = "Sabtu"; }
                }
                const row = `<tr id="r-${i}" class="${cls}">
                    <td>${i}</td><td id="x1-${i}"></td><td id="x2-${i}"></td><td id="x3-${i}"></td><td id="x4-${i}"></td><td id="n-${i}">${ken}</td>
                </tr>`;
                if (i <= 15) tb1.innerHTML += row; else tb2.innerHTML += row;
            }
            if(currentUser) loadFromCloud();
        }

        async function saveData() {
            if (!currentUser) return;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "MENYIMPAN...";
            btn.disabled = true;

            const day = document.getElementById('dPicker').value;
            const monthYear = mInp.value; 
            // Gunakan padStart supaya "1" jadi "01" (Penting untuk susunan database)
            const docId = `${monthYear}-${day.padStart(2, '0')}`;

            const data = {
                v1: document.getElementById('v1').value,
                v2: document.getElementById('v2').value,
                v3: document.getElementById('v3').value,
                v4: document.getElementById('v4').value,
                note: document.getElementById('vNote').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("users").doc(currentUser.uid)
                        .collection("records").doc(docId).set(data, { merge: true });
                
                // Update UI terus tanpa reload cloud
                updateLocalRow(day, data);
                alert("Data Berjaya Disimpan!");
            } catch (e) {
                console.error(e);
                alert("Ralat menyimpan!");
            } finally {
                btn.innerText = "SIMPAN DATA";
                btn.disabled = false;
            }
        }

        function updateLocalRow(day, data) {
            if(document.getElementById(`x1-${day}`)) {
                document.getElementById(`x1-${day}`).innerText = data.v1 || "";
                document.getElementById(`x2-${day}`).innerText = data.v2 || "";
                document.getElementById(`x3-${day}`).innerText = data.v3 || "";
                document.getElementById(`x4-${day}`).innerText = data.v4 || "";
                if(data.note) document.getElementById(`n-${day}`).innerText = data.note;
            }
        }

        async function loadFromCloud() {
            if (!currentUser) return;
            const monthYear = mInp.value;
            
            try {
                // Ambil semua data dalam bulan tersebut
                const snapshot = await db.collection("users").doc(currentUser.uid)
                                         .collection("records")
                                         .where(firebase.firestore.FieldPath.documentId(), ">=", `${monthYear}-01`)
                                         .where(firebase.firestore.FieldPath.documentId(), "<=", `${monthYear}-31`)
                                         .get();

                snapshot.forEach(doc => {
                    const day = parseInt(doc.id.split('-').pop()); // Tukar "01" jadi 1
                    const d = doc.data();
                    updateLocalRow(day, d);
                });
            } catch (e) {
                console.error("Error loading:", e);
            }
        }

        function sync() {
            document.querySelectorAll('.d-bno').forEach(el => el.innerText = document.getElementById('bnoI').value);
            document.querySelectorAll('.d-name').forEach(el => el.innerText = document.getElementById('nameI').value);
        }
    </script>
</body>
</html>
